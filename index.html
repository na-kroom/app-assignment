<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>日めくりカウントダウン</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="calendar">

    <p id="today"></p>

    <div class="days-area">
      <h1 id="days">0</h1>
      <p>DAYS</p>
    </div>

    <p id="event-name">イベント名</p>
    <p id="event-date">2026-01-01</p>

  </div>


  <div class="input-area">

    <input
      type="text"
      id="name-input"
      placeholder="イベント名"
    >

    <input
      type="date"
      id="date-input"
    >

    <button id="set-btn">
      設定
    </button>

  </div>

  <script src="script.js"></script>

</body>

</html>
